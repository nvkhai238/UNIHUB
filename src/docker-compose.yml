name: unihub

services:
  backend:
    build:
      context: ./BE/workshop
      dockerfile: Dockerfile
    container_name: unihub-backend
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MOCK_PAYMENT_URL: http://mock-payment:3001
      CSV_DATA_DIR: /data
    depends_on:
      redis:
        condition: service_healthy
      mock-payment:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - csv-data:/data
    restart: on-failure
    networks:
      - unihub-net

  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - unihub-net

  mock-payment:
    build:
      context: ./mock-payment
      dockerfile: Dockerfile
    container_name: unihub-mock-payment
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SUCCESS_RATE: 70
      FAIL_RATE: 20
      TIMEOUT_RATE: 10
      TIMEOUT_DELAY_MS: 5000
    networks:
      - unihub-net

  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    container_name: unihub-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - unihub-net

volumes:
  csv-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

networks:
  unihub-net:
    driver: bridge
