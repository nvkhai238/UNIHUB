server:
  port: 8080

spring:
  batch:
    job:
      enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 3s

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:${SMTP_USERNAME:}}
    password: ${SMTP_PASS:${SMTP_PASSWORD:}}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS_ENABLE:true}
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

app:
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_KEY:${SUPABASE_SERVICE_ROLE_KEY:}}
    bucket: workshop-files
  gemini:
    url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent}
    api-key: ${GEMINI_API_KEY:}
  jwt:
    secret: ${JWT_SECRET:unihub-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-ttl: 86400
    refresh-token-ttl: 604800
  notification:
    telegram:
      enabled: ${TELEGRAM_ENABLED:true}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
    sms:
      enabled: ${SMS_ENABLED:true}
      twilio:
        account-sid: ${TWILIO_ACCOUNT_SID:}
        auth-token: ${TWILIO_AUTH_TOKEN:}
        from-number: ${TWILIO_FROM_NUMBER:}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@unihub.edu.vn}
    admin: ${MAIL_ADMIN:${MAIL_FROM:noreply@unihub.edu.vn}}
  payment:
    pending-timeout-minutes: ${PAYMENT_PENDING_TIMEOUT_MINUTES:15}
    pending-timeout-scan-ms: ${PAYMENT_PENDING_TIMEOUT_SCAN_MS:60000}
    demo-mode: ${PAYMENT_DEMO_MODE:false}
    demo-latency-ms: ${PAYMENT_DEMO_LATENCY_MS:2000}
  refund:
    form-url: ${REFUND_FORM_URL:}
  csv:
    data-dir: ${CSV_DATA_DIR:../../../data}

resilience4j:
  ratelimiter:
    instances:
      registration:
        limitForPeriod: 5
        limitRefreshPeriod: 10s
        timeoutDuration: 0
        registerHealthIndicator: true
      workshop-read:
        limitForPeriod: 30
        limitRefreshPeriod: 10s
        timeoutDuration: 0
        registerHealthIndicator: true
  circuitbreaker:
    instances:
      payment:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 1
        automaticTransitionFromOpenToHalfOpenEnabled: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
