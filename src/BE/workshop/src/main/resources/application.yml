server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_KEY:}
    bucket: workshop-files
  gemini:
    url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
    api-key: ${GEMINI_API_KEY:}
  jwt:
    secret: ${JWT_SECRET:unihub-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-ttl: 86400
    refresh-token-ttl: 604800

resilience4j:
  ratelimiter:
    instances:
      registration:
        limitForPeriod: 5
        limitRefreshPeriod: 10s
        timeoutDuration: 0
  circuitbreaker:
    instances:
      payment:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
