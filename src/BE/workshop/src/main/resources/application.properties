spring.application.name=workshop
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${DB_PASS:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ddl-auto=none: schema already exists in Supabase.
# SchemaInitializer creates any missing tables (e.g. notifications) at startup.
# Use Flyway migrations for schema changes (V3__add_notifications.sql).
spring.jpa.hibernate.ddl-auto=none

# Notification Configuration
app.notification.email.enabled=${MAIL_ENABLED:false}
app.notification.sms.enabled=${SMS_ENABLED:true}
app.notification.telegram.enabled=${TELEGRAM_ENABLED:true}

# Twilio SMS Config
app.notification.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.notification.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.notification.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}

# Telegram Config
app.notification.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
